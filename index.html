<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>DreamFarm v0.4</title>
  <style>
    body { font-family: Arial; background:#f2f7f2; text-align:center; }
    .box { background:white; padding:15px; margin:10px auto; width:360px; border-radius:10px; }
    .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; }
    .plot {
      background:#dfeedd;
      height:80px;
      border-radius:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-size:13px;
      user-select:none;
    }
    .ready {
      background:#ffeaa7;
      font-weight:bold;
    }
    button { padding:6px; margin:3px; cursor:pointer; }
  </style>
</head>
<body>

<h1>🌱 DreamFarm v0.4</h1>

<div class="box">
  💰 골드: <span id="gold">0</span>
</div>

<div class="box">
  🌱 작물 선택:
  <select id="crop">
    <option value="lettuce">상추 (5초 / 5G)</option>
    <option value="chive">부추 (8초 / 8G)</option>
  </select>
  <button onclick="plantAll()">전체 심기</button>
</div>

<div class="box">
  <div class="grid" id="farm"></div>
</div>

<div class="box">
  📦 창고<br>
  상추: <span id="lCount">0</span> |
  부추: <span id="cCount">0</span><br>
  <button onclick="sell()">전체 판매</button>
</div>

<script>
let gold = 50;

const crops = {
  lettuce: { time: 5000, price: 5, count: 0 },
  chive:   { time: 8000, price: 8, count: 0 }
};

let farm = Array(9).fill(null);

function renderFarm() {
  const farmDiv = document.getElementById("farm");
  farmDiv.innerHTML = "";

  farm.forEach((plot, i) => {
    const div = document.createElement("div");
    div.className = "plot";

    if (!plot) {
      div.innerText = "빈 땅";
      div.onclick = () => plant(i);
    } 
    else if (plot.stage === "growing") {
      div.innerText = "🌱 성장중...";
      div.onclick = null;
    } 
    else if (plot.stage === "ready") {
      div.innerText = "🌾 클릭해서 수확!";
      div.classList.add("ready");

      // 👇 여기 핵심: 클릭해야만 수확
      div.onclick = () => harvest(i);
    }

    farmDiv.appendChild(div);
  });
}

function plantAll() {
  for (let i = 0; i < farm.length; i++) {
    if (!farm[i]) plant(i);
  }
}

function plant(i) {
  if (farm[i]) return;

  const type = document.getElementById("crop").value;

  farm[i] = {
    type: type,
    stage: "growing"
  };

  renderFarm();

  setTimeout(() => {
    if (farm[i]) {
      farm[i].stage = "ready";
      renderFarm();
    }
  }, crops[type].time);
}

function harvest(i) {
  if (!farm[i] || farm[i].stage !== "ready") return;

  const type = farm[i].type;
  crops[type].count += 1;

  farm[i] = null;

  update();
  renderFarm();
}

function sell() {
  let total = 0;

  for (let key in crops) {
    total += crops[key].count * crops[key].price;
    crops[key].count = 0;
  }

  gold += total;
  update();
}

function update() {
  document.getElementById("gold").innerText = gold;
  document.getElementById("lCount").innerText = crops.lettuce.count;
  document.getElementById("cCount").innerText = crops.chive.count;
}

renderFarm();
update();
</script>

</body>
</html>
