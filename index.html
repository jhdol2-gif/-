<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>DreamFarm v0.8.3 Stable</title>

<style>
body { font-family: Arial; background:#f2f7f2; text-align:center; }

.box {
  background:white;
  padding:15px;
  margin:10px auto;
  width:480px;
  border-radius:10px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}

.plot {
  background:#dfeedd;
  height:80px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.ready {
  background:#ffeaa7;
  font-weight:bold;
}

button { padding:6px; margin:3px; cursor:pointer; }
</style>
</head>

<body>

<h1>🌱 DreamFarm v0.8.3 Stable</h1>

<div class="box">
💰 골드: <span id="gold"></span><br>
⭐ 레벨: <span id="level"></span><br>
📊 EXP: <span id="exp"></span>/<span id="maxExp"></span><br>
🌾 씨앗: <span id="seed"></span>
</div>

<div class="box">
<button onclick="resetGame()">🧹 초기화</button>
</div>

<!-- 상점 -->
<div class="box">
<h3>🏪 상점</h3>
<select id="shop"></select>
<button onclick="buySeed()">구매</button>
</div>

<!-- 농장 -->
<div class="box">
<h3>🌱 농장</h3>
<div class="grid" id="farm"></div>
</div>

<!-- 창고 -->
<div class="box">
<h3>📦 창고</h3>
<div id="inventory"></div>
<button onclick="sell()">판매</button>
</div>

<script>

const GAME_VERSION = "0.8.3";

// =====================
// 🌱 기본 상태
// =====================
let gold = 50;
let level = 1;
let exp = 0;
let maxExp = 100;

let seed = {
  lettuce: 3,
  chive: 0,
  carrot: 0
};

let inventory = {
  lettuce: 0,
  chive: 0,
  carrot: 0
};

let farm = Array(9).fill(null);

// =====================
// 🌱 작물 데이터
// =====================
const crops = {
  lettuce: {seed: 5, price: 10, time: 3000},
  chive: {seed: 8, price: 16, time: 5000},
  carrot: {seed: 10, price: 22, time: 7000}
};

// =====================
// 💾 저장
// =====================
function saveGame(){
  localStorage.setItem("dreamfarm", JSON.stringify({
    v: GAME_VERSION,
    gold, level, exp, maxExp,
    seed, inventory, farm
  }));
}

// =====================
// 📥 로드 (완전 안전)
// =====================
function loadGame(){
  const data = JSON.parse(localStorage.getItem("dreamfarm") || "null");

  if(!data || data.v !== GAME_VERSION){
    return;
  }

  gold = data.gold ?? 50;
  level = data.level ?? 1;
  exp = data.exp ?? 0;
  maxExp = data.maxExp ?? 100;

  seed = data.seed ?? seed;
  inventory = data.inventory ?? inventory;

  farm = Array.isArray(data.farm) ? data.farm : Array(9).fill(null);

  if(farm.length !== 9){
    farm = Array(9).fill(null);
  }
}

// =====================
// 🧹 초기화
// =====================
function resetGame(){
  if(!confirm("초기화 할까요?")) return;

  localStorage.removeItem("dreamfarm");

  gold = 50;
  level = 1;
  exp = 0;
  maxExp = 100;

  seed = {lettuce:3, chive:0, carrot:0};
  inventory = {lettuce:0, chive:0, carrot:0};
  farm = Array(9).fill(null);

  render();
  saveGame();
}

// =====================
// 🏪 상점
// =====================
function renderShop(){
  const shop = document.getElementById("shop");
  shop.innerHTML = "";

  for(let k in crops){
    const opt = document.createElement("option");
    opt.value = k;
    opt.innerText = `${k} (${crops[k].seed}G)`;
    shop.appendChild(opt);
  }
}

function buySeed(){
  const type = document.getElementById("shop").value;

  if(gold < crops[type].seed) return;

  gold -= crops[type].seed;
  seed[type]++;

  saveGame();
  render();
}

// =====================
// 🌱 농장
// =====================
function plant(i){
  const type = "lettuce";

  if(!seed[type]) return;

  if(farm[i]) return;

  seed[type]--;

  farm[i] = {type, stage:"grow"};

  setTimeout(()=>{
    if(farm[i]){
      farm[i].stage = "ready";
      renderFarm();
    }
  }, crops[type].time);

  renderFarm();
}

function harvest(i){
  const type = farm[i].type;

  inventory[type]++;

  farm[i] = null;

  exp += 10;
  if(exp >= maxExp){
    exp -= maxExp;
    level++;
    maxExp += 20;
  }

  saveGame();
  render();
}

// =====================
// 💰 판매
// =====================
function sell(){
  let total = 0;

  for(let k in inventory){
    total += inventory[k] * crops[k].price;
    inventory[k] = 0;
  }

  gold += total;

  exp += 20;

  saveGame();
  render();
}

// =====================
// 🌾 렌더
// =====================
function renderFarm(){
  const farmDiv = document.getElementById("farm");
  farmDiv.innerHTML = "";

  farm.forEach((p,i)=>{
    const d = document.createElement("div");
    d.className = "plot";

    if(!p){
      d.innerText = "빈 땅";
      d.onclick = () => plant(i);
    } else if(p.stage === "grow"){
      d.innerText = "🌱 성장";
    } else {
      d.innerText = "🌾 수확";
      d.onclick = () => harvest(i);
      d.classList.add("ready");
    }

    farmDiv.appendChild(d);
  });
}

// =====================
// 📦 창고
// =====================
function renderInventory(){
  let html = "";

  for(let k in inventory){
    html += `${k}: ${inventory[k]}<br>`;
  }

  document.getElementById("inventory").innerHTML = html;
}

// =====================
// 🔄 전체 렌더
// =====================
function render(){
  document.getElementById("gold").innerText = gold;
  document.getElementById("level").innerText = level;
  document.getElementById("exp").innerText = exp;
  document.getElementById("maxExp").innerText = maxExp;

  document.getElementById("seed").innerText =
    Object.values(seed).reduce((a,b)=>a+b,0);

  renderFarm();
  renderInventory();
  renderShop();
}

// =====================
// 🚀 시작
// =====================
loadGame();
render();
// 🌦 날씨
let weather = "☀️ 맑음";
let weatherRate = 1;

function changeWeather(){
  const r = Math.random();

  if(r < 0.33){
    weather = "☀️ 맑음";
    weatherRate = 1;
  } else if(r < 0.66){
    weather = "🌧 비";
    weatherRate = 0.7;
  } else {
    weather = "🔥 폭염";
    weatherRate = 1.2;
  }
}

// 🐛 해충
function pestAttack(){
  const r = Math.random();

  if(r < 0.1){
    const i = Math.floor(Math.random() * farm.length);
    if(farm[i]){
      farm[i] = null;
      renderFarm();
    }
  }
}

// ⏱ 실행
setInterval(changeWeather, 15000);
setInterval(pestAttack, 20000);
</script>

</body>
</html>
