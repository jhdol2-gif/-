<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>DreamFarm v1.1 Stable</title>

<style>
body { font-family: Arial; background:#f2f7f2; text-align:center; }

.box {
  background:white;
  padding:15px;
  margin:10px auto;
  width:500px;
  border-radius:10px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}

.plot {
  background:#dfeedd;
  height:80px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.ready { background:#ffeaa7; font-weight:bold; }

button { padding:6px; margin:3px; cursor:pointer; }
</style>
</head>

<body>

<h1>🌱 DreamFarm v1.1 Stable</h1>

<div class="box">
💰 골드: <span id="gold">0</span><br>
⭐ 레벨: <span id="level">1</span><br>
📊 EXP: <span id="exp">0</span>/<span id="maxExp">100</span><br>
🌦 날씨: <span id="weather">-</span>
</div>

<div class="box">
<button onclick="resetGame()">🧹 초기화</button>
</div>

<!-- 🏪 상점 -->
<div class="box">
<h3>🏪 상점</h3>
<select id="shop"></select>
<button onclick="safe(buySeed)">구매</button>
</div>

<!-- 🌱 농장 -->
<div class="box">
<h3>🌱 농장</h3>
<div class="grid" id="farm"></div>
</div>

<!-- 📦 창고 -->
<div class="box">
<h3>📦 창고</h3>
<div id="inventory"></div>
<button onclick="safe(sell)">판매</button>
</div>

<script>

const VERSION = "1.1";

// =====================
// 🧠 기본 상태
// =====================
let gold = 50;
let level = 1;
let exp = 0;
let maxExp = 100;

let seed = { lettuce: 3 };
let inventory = { lettuce: 0 };
let farm = Array(9).fill(null);

// =====================
// 🌾 작물
// =====================
const crops = {
  lettuce: {seed: 5, price: 10, time: 3000}
};

// =====================
// 🧱 안전 실행 래퍼 (핵심)
// =====================
function safe(fn){
  try{
    fn();
  } catch(e){
    console.log("에러 방지:", e);
  }
}

// =====================
// 💾 저장
// =====================
function save(){
  try{
    localStorage.setItem("dreamfarm", JSON.stringify({
      v: VERSION,
      gold, level, exp, maxExp,
      seed, inventory, farm
    }));
  } catch(e){}
}

// =====================
// 📥 로드
// =====================
function load(){
  try{
    const data = JSON.parse(localStorage.getItem("dreamfarm"));

    if(!data || data.v !== VERSION) return;

    gold = data.gold ?? gold;
    level = data.level ?? level;
    exp = data.exp ?? exp;
    maxExp = data.maxExp ?? maxExp;

    seed = data.seed ?? seed;
    inventory = data.inventory ?? inventory;

    farm = Array.isArray(data.farm) ? data.farm : Array(9).fill(null);

  } catch(e){
    console.log("load 실패");
  }
}

// =====================
// 🏪 상점
// =====================
function renderShop(){
  const s = document.getElementById("shop");
  if(!s) return;

  s.innerHTML = "";

  for(let k in crops){
    let opt = document.createElement("option");
    opt.value = k;
    opt.innerText = `${k} (${crops[k].seed}G)`;
    s.appendChild(opt);
  }
}

function buySeed(){
  const type = document.getElementById("shop").value;

  if(gold < crops[type].seed) return;

  gold -= crops[type].seed;
  seed[type]++;

  save();
  render();
}

// =====================
// 🌱 농장
// =====================
function plant(i){

  if(farm[i]) return;
  if(seed.lettuce <= 0) return;

  seed.lettuce--;

  farm[i] = {type:"lettuce", stage:"grow"};

  setTimeout(()=>{
    try{
      if(farm[i]){
        farm[i].stage = "ready";
        renderFarm();
      }
    } catch(e){}
  }, crops.lettuce.time);

  renderFarm();
}

function harvest(i){

  inventory.lettuce++;

  farm[i] = null;

  exp += 10;

  if(exp >= maxExp){
    exp -= maxExp;
    level++;
    maxExp += 20;
  }

  save();
  render();
}

// =====================
// 💰 판매
// =====================
function sell(){

  let total = inventory.lettuce * crops.lettuce.price;

  gold += total;
  inventory.lettuce = 0;

  exp += 20;

  save();
  render();
}

// =====================
// 🌦 날씨
// =====================
let weather = "☀️";
let weatherRate = 1;

function weatherSystem(){
  const r = Math.random();

  if(r < 0.33){
    weather = "☀️";
    weatherRate = 1;
  }
  else if(r < 0.66){
    weather = "🌧";
    weatherRate = 0.7;
  }
  else{
    weather = "🔥";
    weatherRate = 1.2;
  }

  const w = document.getElementById("weather");
  if(w) w.innerText = weather;
}

// =====================
// 🐛 해충
// =====================
function pest(){
  const r = Math.random();

  if(r < 0.1){
    const i = Math.floor(Math.random() * farm.length);
    if(farm[i]) farm[i] = null;
  }

  renderFarm();
}

// =====================
// 🌱 렌더
// =====================
function renderFarm(){
  const f = document.getElementById("farm");
  if(!f) return;

  f.innerHTML = "";

  farm.forEach((p,i)=>{

    const d = document.createElement("div");
    d.className = "plot";

    if(!p){
      d.innerText = "빈 땅";
      d.onclick = ()=>safe(()=>plant(i));
    }
    else if(p.stage === "grow"){
      d.innerText = "🌱 성장";
    }
    else{
      d.innerText = "🌾 수확";
      d.classList.add("ready");
      d.onclick = ()=>safe(()=>harvest(i));
    }

    f.appendChild(d);
  });
}

// =====================
// 📦 창고
// =====================
function renderInventory(){
  const inv = document.getElementById("inventory");
  if(!inv) return;

  inv.innerHTML = `상추: ${inventory.lettuce}`;
}

// =====================
// 🔄 전체 렌더
// =====================
function render(){

  document.getElementById("gold").innerText = gold;
  document.getElementById("level").innerText = level;
  document.getElementById("exp").innerText = exp;
  document.getElementById("maxExp").innerText = maxExp;

  renderFarm();
  renderInventory();
  renderShop();
}

// =====================
// 🚀 시작
// =====================
load();
render();
weatherSystem();

setInterval(weatherSystem, 15000);
setInterval(pest, 20000);

</script>

</body>
</html>
