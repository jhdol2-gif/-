<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>DreamFarm Stable Template</title>

<style>
body { font-family: Arial; background:#f2f7f2; text-align:center; }

.box {
  background:white;
  padding:15px;
  margin:10px auto;
  width:480px;
  border-radius:10px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}

.plot {
  background:#dfeedd;
  height:80px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.ready {
  background:#ffeaa7;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>🌱 DreamFarm Stable</h1>

<div class="box">
💰 골드: <span id="gold"></span><br>
⭐ 레벨: <span id="level"></span><br>
📊 EXP: <span id="exp"></span>/<span id="maxExp"></span>
</div>

<div class="box">
<div class="grid" id="farm"></div>
</div>

<div class="box">
<h3>📦 창고</h3>
<div id="inventory"></div>
</div>

<script>

const VERSION = "1.0";

// =====================
// 🌱 기본 상태 (절대 건드리지 말 것)
// =====================
let gold = 50;
let level = 1;
let exp = 0;
let maxExp = 100;

let farm = Array(9).fill(null);

let inventory = {
  crop: 0
};

// =====================
// 🌱 핵심 데이터
// =====================
const cropData = {
  time: 3000,
  price: 10
};

// =====================
// 💾 저장 (고정 구조)
// =====================
function save(){
  localStorage.setItem("dreamfarm", JSON.stringify({
    v: VERSION,
    gold, level, exp, maxExp,
    farm,
    inventory
  }));
}

// =====================
// 📥 로드 (무조건 안전)
// =====================
function load(){
  const data = JSON.parse(localStorage.getItem("dreamfarm") || "null");

  if(!data || data.v !== VERSION){
    return;
  }

  gold = data.gold ?? 50;
  level = data.level ?? 1;
  exp = data.exp ?? 0;
  maxExp = data.maxExp ?? 100;

  farm = Array.isArray(data.farm) ? data.farm : Array(9).fill(null);
  inventory = data.inventory ?? {crop:0};
}

// =====================
// 🌱 심기
// =====================
function plant(i){

  if(farm[i]) return;

  farm[i] = {stage:"grow"};

  setTimeout(()=>{
    if(farm[i]){
      farm[i].stage = "ready";
      renderFarm();
    }
  }, cropData.time);

  renderFarm();
}

// =====================
// 🌾 수확
// =====================
function harvest(i){

  inventory.crop++;

  farm[i] = null;

  exp += 10;

  if(exp >= maxExp){
    exp -= maxExp;
    level++;
    maxExp += 20;
  }

  save();
  render();
}

// =====================
// 🌾 농장 렌더
// =====================
function renderFarm(){

  const farmDiv = document.getElementById("farm");
  farmDiv.innerHTML = "";

  farm.forEach((p,i)=>{

    const d = document.createElement("div");
    d.className = "plot";

    if(!p){
      d.innerText = "빈 땅";
      d.onclick = ()=>plant(i);
    }
    else if(p.stage === "grow"){
      d.innerText = "🌱 성장중";
    }
    else{
      d.innerText = "🌾 수확";
      d.classList.add("ready");
      d.onclick = ()=>harvest(i);
    }

    farmDiv.appendChild(d);
  });
}

// =====================
// 📦 창고
// =====================
function renderInventory(){
  document.getElementById("inventory").innerHTML =
    "작물: " + inventory.crop;
}

// =====================
// 🔄 UI
// =====================
function render(){

  document.getElementById("gold").innerText = gold;
  document.getElementById("level").innerText = level;
  document.getElementById("exp").innerText = exp;
  document.getElementById("maxExp").innerText = maxExp;

  renderFarm();
  renderInventory();
}

// =====================
// 🚀 시작 (이 순서 절대 고정)
// =====================
load();
render();

</script>

</body>
</html>
