<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>DreamFarm v0.8</title>

<style>
body { font-family: Arial; background:#f2f7f2; text-align:center; }

.box {
  background:white;
  padding:15px;
  margin:10px auto;
  width:460px;
  border-radius:10px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}

.plot {
  background:#dfeedd;
  height:80px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:12px;
}

.ready { background:#ffeaa7; font-weight:bold; }

button { padding:6px; margin:3px; cursor:pointer; }
</style>
</head>

<body>

<h1>🌱 DreamFarm v0.8</h1>

<div class="box">
💰 골드: <span id="gold">0</span><br>
⭐ 레벨: <span id="level">1</span><br>
📊 경험치: <span id="exp">0</span>/<span id="maxExp">100</span><br>
🌦 날씨: <span id="weather">맑음</span><br>
🏆 칭호: <span id="title">없음</span>
</div>

<!-- 🏪 상점 -->
<div class="box">
<h3>🏪 상점</h3>
<select id="shop">
  <option value="lettuce">🥬 상추</option>
  <option value="chive">🧅 부추</option>
  <option value="carrot">🥕 당근</option>
  <option value="tomato">🍅 토마토</option>
  <option value="corn">🌽 옥수수</option>
  <option value="potato">🥔 감자</option>
</select>
<button onclick="buySeed()">씨앗 구매</button>
</div>

<!-- 🌱 농장 -->
<div class="box">
<h3>🌱 농장</h3>

<select id="crop">
  <option value="lettuce">🥬 상추</option>
  <option value="chive">🧅 부추</option>
  <option value="carrot">🥕 당근</option>
  <option value="tomato">🍅 토마토</option>
  <option value="corn">🌽 옥수수</option>
  <option value="potato">🥔 감자</option>
</select>

<button onclick="plantAll()">전체 심기</button>

<div class="grid" id="farm"></div>
</div>

<!-- 📦 창고 -->
<div class="box">
<h3>📦 창고</h3>
<div id="storage"></div>
<button onclick="sell()">전체 판매</button>
</div>

<script>

let gold = 50;
let level = 1;
let exp = 0;
let maxExp = 100;

let weather = "☀️ 맑음";
let weatherRate = 1;

// 🌱 작물
const crops = {
  lettuce:{time:3000, price:10, seed:5, count:0},
  chive:{time:5000, price:16, seed:8, count:0},
  carrot:{time:7000, price:22, seed:10, count:0},
  tomato:{time:9000, price:28, seed:12, count:0},
  corn:{time:12000, price:35, seed:15, count:0},
  potato:{time:15000, price:45, seed:18, count:0}
};

let farm = Array(9).fill(null);

// 🧠 저장 로드
function loadGame(){
  const save = localStorage.getItem("dreamfarm");

  if(save){
    const data = JSON.parse(save);

    gold = data.gold;
    level = data.level;
    exp = data.exp;
    maxExp = data.maxExp;
    farm = data.farm;
    Object.assign(crops, data.crops);
  }
}

// 💾 저장
function saveGame(){
  const data = {
    gold,
    level,
    exp,
    maxExp,
    farm,
    crops
  };

  localStorage.setItem("dreamfarm", JSON.stringify(data));
}

// 🧑‍🌾 레벨업
function addExp(amount){
  exp += amount;

  if(exp >= maxExp){
    exp -= maxExp;
    level++;
    maxExp = Math.floor(maxExp * 1.3);

    gold += 20 * level; // 레벨 보너스
  }

  update();
}

// 🏪 구매
function buySeed(){
  const type = document.getElementById("shop").value;

  if(gold >= crops[type].seed){
    gold -= crops[type].seed;
    crops[type].count++;
    saveGame();
    update();
  }
}

// 🌱 심기
function plant(i){
  if(farm[i]) return;

  const type = document.getElementById("crop").value;

  if(crops[type].count <= 0) return;

  crops[type].count--;

  farm[i] = {type, stage:"growing"};

  setTimeout(()=>{
    if(farm[i]){
      farm[i].stage="ready";
      renderFarm();
    }
  }, crops[type].time);

  renderFarm();
}

// 🌱 전체 심기
function plantAll(){
  for(let i=0;i<farm.length;i++){
    if(!farm[i]) plant(i);
  }
}

// 🌾 수확
function harvest(i){
  const type = farm[i].type;

  crops[type].count++;
  gold += Math.floor(crops[type].price * 0.5);

  addExp(10);

  farm[i]=null;

  saveGame();
  renderFarm();
  update();
}

// 📦 창고
function renderStorage(){
  let html="";

  for(let k in crops){
    html += `${k} : ${crops[k].count}<br>`;
  }

  document.getElementById("storage").innerHTML = html;
}

// 🌾 농장
function renderFarm(){
  const farmDiv = document.getElementById("farm");
  farmDiv.innerHTML = "";

  farm.forEach((plot,i)=>{
    const div = document.createElement("div");
    div.className="plot";

    if(!plot){
      div.innerText="빈 땅";
      div.onclick=()=>plant(i);
    }
    else if(plot.stage==="growing"){
      div.innerText="🌱 성장중...";
    }
    else{
      div.innerText="🌾 수확!";
      div.classList.add("ready");
      div.onclick=()=>harvest(i);
    }

    farmDiv.appendChild(div);
  });
}

// 💰 판매
function sell(){
  let total=0;

  for(let k in crops){
    total += crops[k].count * crops[k].price;
    crops[k].count=0;
  }

  gold += total;
  addExp(20);

  saveGame();
  update();
}

// 🔄 UI
function update(){
  document.getElementById("gold").innerText = gold;
  document.getElementById("level").innerText = level;
  document.getElementById("exp").innerText = exp;
  document.getElementById("maxExp").innerText = maxExp;

  renderStorage();
}

// 🚀 시작
loadGame();
renderFarm();
update();

</script>

</body>
</html>
