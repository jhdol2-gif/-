<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>DreamFarm v0.7</title>

<style>
body { font-family: Arial; background:#f2f7f2; text-align:center; }

.box {
  background:white;
  padding:15px;
  margin:10px auto;
  width:450px;
  border-radius:10px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}

.plot {
  background:#dfeedd;
  height:80px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:12px;
  user-select:none;
}

.ready { background:#ffeaa7; font-weight:bold; }

button { padding:6px; margin:3px; cursor:pointer; }
</style>
</head>

<body>

<h1>🌱 DreamFarm v0.7</h1>

<div class="box">
💰 골드: <span id="gold">0</span><br>
🌦 날씨: <span id="weather">맑음</span><br>
🏆 칭호: <span id="title">없음</span>
</div>

<!-- 🏪 상점 -->
<div class="box">
<h3>🏪 상점</h3>
<select id="shop">
  <option value="lettuce">🥬 상추 (10G)</option>
  <option value="chive">🧅 부추 (15G)</option>
  <option value="carrot">🥕 당근 (20G)</option>
  <option value="tomato">🍅 토마토 (25G)</option>
  <option value="corn">🌽 옥수수 (35G)</option>
  <option value="potato">🥔 감자 (40G)</option>
</select>
<button onclick="buySeed()">씨앗 구매</button>
</div>

<!-- 🌱 농장 -->
<div class="box">
<h3>🌱 농장</h3>
<select id="crop">
  <option value="lettuce">🥬 상추</option>
  <option value="chive">🧅 부추</option>
  <option value="carrot">🥕 당근</option>
  <option value="tomato">🍅 토마토</option>
  <option value="corn">🌽 옥수수</option>
  <option value="potato">🥔 감자</option>
</select>

<button onclick="plantAll()">전체 심기</button>

<div class="grid" id="farm"></div>
</div>

<!-- 📦 창고 -->
<div class="box">
<h3>📦 창고</h3>
<div id="storage"></div>
<button onclick="sell()">전체 판매</button>
</div>

<script>

let gold = 50;
let weather = "☀️ 맑음";
let weatherRate = 1;

// 🌱 작물 데이터
const crops = {
  lettuce:{time:5000, price:5, seed:10, count:0},
  chive:{time:8000, price:8, seed:15, count:0},
  carrot:{time:10000, price:12, seed:20, count:0},
  tomato:{time:12000, price:15, seed:25, count:0},
  corn:{time:15000, price:20, seed:35, count:0},
  potato:{time:18000, price:25, seed:40, count:0}
};

let farm = Array(9).fill(null);

// 🏆 칭호
const titles = [
  {g:0, t:"없음"},
  {g:100, t:"🌱 초보 농부"},
  {g:500, t:"🥬 상추 장인"},
  {g:2000, t:"💰 농장 재벌"}
];

// 🌦 날씨 변경
function changeWeather(){
  const r = Math.random();

  if(r < 0.33){
    weather = "☀️ 맑음";
    weatherRate = 1;
  } else if(r < 0.66){
    weather = "🌧 비 (성장 빠름)";
    weatherRate = 0.8;
  } else {
    weather = "🔥 폭염 (성장 느림)";
    weatherRate = 1.3;
  }

  document.getElementById("weather").innerText = weather;
}

setInterval(changeWeather, 15000);

// 🏪 씨앗 구매
function buySeed(){
  const type = document.getElementById("shop").value;

  if(gold >= crops[type].seed){
    gold -= crops[type].seed;
    crops[type].count++; // 창고에 씨앗처럼 저장
    update();
  } else {
    alert("골드 부족!");
  }
}

// 🌱 심기
function plant(i){
  if(farm[i]) return;

  const type = document.getElementById("crop").value;

  if(crops[type].count <= 0){
    alert("씨앗 부족!");
    return;
  }

  crops[type].count--;

  farm[i] = {type, stage:"growing"};

  const growTime = crops[type].time * weatherRate;

  setTimeout(()=>{
    if(farm[i]){
      farm[i].stage = "ready";
      renderFarm();
    }
  }, growTime);

  renderFarm();
}

// 🌱 전체 심기
function plantAll(){
  for(let i=0;i<farm.length;i++){
    if(!farm[i]) plant(i);
  }
}

// 🌾 수확
function harvest(i){
  const type = farm[i].type;
  crops[type].count++;

  farm[i]=null;

  renderFarm();
  update();
}

// 📦 창고 표시
function renderStorage(){
  let html = "";

  for(let k in crops){
    html += `${k} : ${crops[k].count}<br>`;
  }

  document.getElementById("storage").innerHTML = html;
}

// 🌾 농장 렌더
function renderFarm(){
  const farmDiv = document.getElementById("farm");
  farmDiv.innerHTML = "";

  farm.forEach((plot,i)=>{
    const div = document.createElement("div");
    div.className = "plot";

    if(!plot){
      div.innerText="빈 땅";
      div.onclick=()=>plant(i);
    }
    else if(plot.stage==="growing"){
      div.innerText="🌱 성장중...";
    }
    else{
      div.innerText="🌾 수확!";
      div.classList.add("ready");
      div.onclick=()=>harvest(i);
    }

    farmDiv.appendChild(div);
  });
}

// 💰 판매
function sell(){
  let total = 0;

  for(let k in crops){
    total += crops[k].count * crops[k].price;
    crops[k].count = 0;
  }

  gold += total;

  update();
}

// 🏆 칭호
function updateTitle(){
  let t = "없음";

  for(let i=0;i<titles.length;i++){
    if(gold >= titles[i].g) t = titles[i].t;
  }

  document.getElementById("title").innerText = t;
}

// 🔄 전체 업데이트
function update(){
  document.getElementById("gold").innerText = gold;
  renderStorage();
  updateTitle();
}

// 🐛 이벤트
function randomEvent(){
  const r = Math.random();

  if(r < 0.2){
    // 벌레
    const idx = Math.floor(Math.random()*farm.length);
    farm[idx] = null;
  }
  else if(r < 0.3){
    // 풍년
    for(let k in crops){
      crops[k].count++;
    }
  }

  renderFarm();
  update();
}

setInterval(randomEvent, 20000);

// 초기 실행
renderFarm();
update();
changeWeather();

</script>

</body>
</html>
