<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>Dream Farm</title>

<style>

body{
background:#dff5d8;
font-family:sans-serif;
text-align:center;
}

.box{
background:white;
margin:15px;
padding:15px;
border-radius:15px;
}

button{
padding:10px;
margin:5px;
font-size:16px;
}

.land{
display:inline-block;
width:80px;
height:80px;
border:2px solid green;
margin:5px;
line-height:80px;
cursor:pointer;
background:#b57f50;
color:white;
}

</style>

</head>

<body>

<h1>🌱 Dream Farm 🌱</h1>

<div class="box">

<h2 id="gold"></h2>

<button onclick="attendance()">

📅 출석하기

</button>

<p id="day"></p>

</div>

<div class="box">

<h2>🏪 씨앗 상점</h2>

<button onclick="buySeed()">

상추 씨앗 10G

</button>

<p id="seed"></p>

</div>

<div class="box">

<h2>🌾 농장</h2>

<div id="farm"></div>

</div>

<div class="box">

<h2>📦 창고</h2>

<p id="bag"></p>

</div>

<script>

let gold=
Number(localStorage.getItem("gold"))||100;

let seed=
Number(localStorage.getItem("seed"))||0;

let lettuce=
Number(localStorage.getItem("lettuce"))||0;

let day=
Number(localStorage.getItem("day"))||1;

let last=
localStorage.getItem("last")||"";

let farm=
JSON.parse(
localStorage.getItem("farm")
)||

[
0,0,0,0,0
];

function save(){

localStorage.setItem(
"gold",
gold
);

localStorage.setItem(
"seed",
seed
);

localStorage.setItem(
"lettuce",
lettuce
);

localStorage.setItem(
"day",
day
);

localStorage.setItem(
"last",
last
);

localStorage.setItem(
"farm",
JSON.stringify(farm)
);

draw();

}

function draw(){

document.getElementById(
"gold"
).innerHTML=
"💰 골드 : "+
gold+"G";

document.getElementById(
"seed"
).innerHTML=
"상추 씨앗 : "+
seed;

document.getElementById(
"bag"
).innerHTML=
"상추 : "+
lettuce;

document.getElementById(
"day"
).innerHTML=
day+
"일차 출석";

let html="";

for(let i=0;i<5;i++){

if(farm[i]==0){

html+=
"<div class='land' onclick='plant("+i+")'>빈땅</div>";

}

else{

html+=
"<div class='land'>🌱</div>";

}

}

document.getElementById(
"farm"
).innerHTML=
html;

}

function attendance(){

let today=
new Date().toDateString();

if(today==last){

alert(
"오늘은 이미 출석!"
);

return;

}

gold+=day*10;

last=today;

day++;

if(day>7){

day=1;

}

save();

}

function buySeed(){

if(gold<10){

alert(
"골드 부족!"
);

return;

}

gold-=10;

seed++;

save();

}

function plant(i){

if(farm[i]==1){

return;

}

if(seed<=0){

alert(
"씨앗이 없습니다!"
);

return;

}

seed--;

farm[i]=1;

save();

setTimeout(

function(){

farm[i]=0;

lettuce++;

alert(
"🥬 상추 수확!"
);

save();

},

5000

);

}

draw();

</script>

</body>

</html>
