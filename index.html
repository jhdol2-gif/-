<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>DreamFarm v1.2</title>

<style>
body { font-family: Arial; background:#f2f7f2; text-align:center; }

.box {
  background:white;
  padding:15px;
  margin:10px auto;
  width:520px;
  border-radius:10px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}

.plot {
  background:#dfeedd;
  height:80px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.ready { background:#ffeaa7; font-weight:bold; }

button { padding:6px; margin:3px; cursor:pointer; }
</style>
</head>

<body>

<h1>🌱 DreamFarm v1.2</h1>

<div class="box">
💰 골드: <span id="gold">0</span><br>
⭐ 레벨: <span id="level">1</span><br>
📊 EXP: <span id="exp">0</span>/<span id="maxExp">100</span><br>
🧑‍🌾 농부레벨: <span id="farmerLv">1</span><br>
🌦 날씨: <span id="weather">☀️</span><br>
📈 시장: <span id="market">-</span>
</div>

<div class="box">
<button onclick="resetGame()">🧹 초기화</button>
</div>

<div class="box">
<h3>🏪 상점</h3>
<select id="shop"></select>
<button onclick="buySeed()">구매</button>
</div>

<div class="box">
<h3>🌱 농장</h3>
<div class="grid" id="farm"></div>
</div>

<div class="box">
<h3>📦 창고</h3>
<div id="inventory"></div>
<button onclick="sell()">판매</button>
</div>

<script>

// =====================
// 🧠 기본 상태
// =====================
let gold = 50;
let level = 1;
let exp = 0;
let maxExp = 100;
let farmerLv = 1;

let seed = { lettuce: 5 };
let inventory = { lettuce: 0 };
let farm = Array(9).fill(null);

// =====================
// 🌾 작물
// =====================
const crops = {
  lettuce: {seed: 5, basePrice: 10, time: 3000}
};

// =====================
// 💾 저장
// =====================
function save(){
  localStorage.setItem("dreamfarm", JSON.stringify({
    gold, level, exp, maxExp,
    farmerLv,
    seed, inventory, farm,
    marketPrice
  }));
}

// =====================
// 📥 로드
// =====================
function load(){
  const d = JSON.parse(localStorage.getItem("dreamfarm") || "null");
  if(!d) return;

  gold = d.gold ?? gold;
  level = d.level ?? level;
  exp = d.exp ?? exp;
  maxExp = d.maxExp ?? maxExp;
  farmerLv = d.farmerLv ?? farmerLv;

  seed = d.seed ?? seed;
  inventory = d.inventory ?? inventory;
  farm = Array.isArray(d.farm) ? d.farm : Array(9).fill(null);

  marketPrice = d.marketPrice ?? crops.lettuce.basePrice;
}

// =====================
// 🌦 날씨
// =====================
let weather = "☀️";
let weatherRate = 1;

function weatherSystem(){
  const r = Math.random();

  if(r < 0.33){
    weather = "☀️";
    weatherRate = 1;
  }
  else if(r < 0.66){
    weather = "🌧";
    weatherRate = 0.7;
  }
  else{
    weather = "🔥";
    weatherRate = 1.2;
  }

  document.getElementById("weather").innerText = weather;
}

// =====================
// 📈 시장 가격
// =====================
let marketPrice = 10;

function marketSystem(){
  const change = Math.floor(Math.random()*5 - 2);
  marketPrice = Math.max(3, crops.lettuce.basePrice + change);

  document.getElementById("market").innerText =
    "상추 " + marketPrice + "G";
}

// =====================
// 🐛 해충
// =====================
function pest(){
  const chance = Math.random() - (farmerLv * 0.02);

  if(chance < 0.08){
    const i = Math.floor(Math.random()*farm.length);
    if(farm[i]) farm[i] = null;
  }

  renderFarm();
}

// =====================
// 🌱 심기
// =====================
function plant(i){

  if(farm[i]) return;
  if(seed.lettuce <= 0) return;

  seed.lettuce--;

  farm[i] = {stage:"grow"};

  setTimeout(()=>{
    if(farm[i]){
      farm[i].stage = "ready";
      renderFarm();
    }
  }, crops.lettuce.time * weatherRate);

  save();
  render();
}

// =====================
// 🌾 수확
// =====================
function harvest(i){

  inventory.lettuce++;

  farm[i] = null;

  exp += 10;

  if(exp >= maxExp){
    exp -= maxExp;
    level++;
    farmerLv++;
    maxExp += 20;
  }

  save();
  render();
}

// =====================
// 💰 판매
// =====================
function sell(){

  gold += inventory.lettuce * marketPrice;
  inventory.lettuce = 0;

  exp += 20;

  save();
  render();
}

// =====================
// 🌾 렌더
// =====================
function renderFarm(){

  const f = document.getElementById("farm");
  f.innerHTML = "";

  farm.forEach((p,i)=>{

    const d = document.createElement("div");
    d.className = "plot";

    if(!p){
      d.innerText = "빈 땅";
      d.onclick = ()=>plant(i);
    }
    else if(p.stage === "grow"){
      d.innerText = "🌱 성장";
    }
    else{
      d.innerText = "🌾 수확";
      d.classList.add("ready");
      d.onclick = ()=>harvest(i);
    }

    f.appendChild(d);
  });
}

// =====================
// 📦 창고
// =====================
function renderInventory(){
  document.getElementById("inventory").innerHTML =
    "상추: " + inventory.lettuce;
}

// =====================
// 🏪 상점
// =====================
function renderShop(){
  const s = document.getElementById("shop");
  s.innerHTML = "";

  let opt = document.createElement("option");
  opt.value = "lettuce";
  opt.innerText = "상추 씨앗 (5G)";
  s.appendChild(opt);
}

function buySeed(){

  if(gold < 5) return;

  gold -= 5;
  seed.lettuce++;

  save();
  render();
}

// =====================
// 🧹 초기화
// =====================
function resetGame(){

  localStorage.removeItem("dreamfarm");

  gold = 50;
  level = 1;
  exp = 0;
  maxExp = 100;
  farmerLv = 1;

  seed = {lettuce:5};
  inventory = {lettuce:0};
  farm = Array(9).fill(null);
  marketPrice = 10;

  render();
}

// =====================
// 🔄 렌더
// =====================
function render(){

  document.getElementById("gold").innerText = gold;
  document.getElementById("level").innerText = level;
  document.getElementById("exp").innerText = exp;
  document.getElementById("maxExp").innerText = maxExp;
  document.getElementById("farmerLv").innerText = farmerLv;

  renderFarm();
  renderInventory();
  renderShop();
}

// =====================
// 🚀 시작
// =====================
load();
render();
weatherSystem();
marketSystem();

setInterval(weatherSystem, 15000);
setInterval(pest, 20000);
setInterval(marketSystem, 10000);

</script>

</body>
</html>
