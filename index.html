<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>DreamFarm v0.6</title>
<style>
body { font-family: Arial; background:#f2f7f2; text-align:center; }
.box { background:white; padding:15px; margin:10px auto; width:420px; border-radius:10px; }
.grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; }

.plot {
  background:#dfeedd;
  height:80px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:12px;
  user-select:none;
}

.ready { background:#ffeaa7; font-weight:bold; }

button { padding:6px; margin:3px; cursor:pointer; }
</style>
</head>
<body>

<h1>🌱 DreamFarm v0.6</h1>

<div class="box">
💰 골드: <span id="gold">0</span><br>
🌦 날씨: <span id="weather">맑음</span><br>
🏆 칭호: <span id="title">없음</span>
</div>

<div class="box">
🌱 작물:
<select id="crop">
<option value="lettuce">🥬 상추</option>
<option value="chive">🧅 부추</option>
<option value="carrot">🥕 당근</option>
<option value="tomato">🍅 토마토</option>
<option value="corn">🌽 옥수수</option>
<option value="potato">🥔 감자</option>
</select>

<button onclick="plantAll()">전체 심기</button>
</div>

<div class="box">
<div class="grid" id="farm"></div>
</div>

<div class="box">
📦 창고<br>
<button onclick="sell()">전체 판매</button>
</div>

<script>
let gold = 50;

const crops = {
 lettuce: { time: 5000, price: 5, count: 0 },
 chive:   { time: 8000, price: 8, count: 0 },
 carrot:  { time: 10000, price: 12, count: 0 },
 tomato:  { time: 12000, price: 15, count: 0 },
 corn:    { time: 15000, price: 20, count: 0 },
 potato:  { time: 18000, price: 25, count: 0 }
};

let farm = Array(9).fill(null);

let weather = "☀️ 맑음";
let weatherRate = 1;

const titles = [
 { g:0, t:"없음"},
 { g:100, t:"🌱 초보 농부"},
 { g:500, t:"🥬 상추 장인"},
 { g:2000, t:"💰 농장 재벌"}
];

function updateTitle(){
 let t = "없음";
 for(let i=0;i<titles.length;i++){
   if(gold >= titles[i].g) t = titles[i].t;
 }
 document.getElementById("title").innerText = t;
}

function changeWeather(){
 const r = Math.random();

 if(r < 0.33){
   weather = "☀️ 맑음";
   weatherRate = 1;
 }
 else if(r < 0.66){
   weather = "🌧 비 (성장↑)";
   weatherRate = 0.8;
 }
 else{
   weather = "🔥 폭염 (성장↓)";
   weatherRate = 1.3;
 }

 document.getElementById("weather").innerText = weather;
}

setInterval(changeWeather, 15000);

function renderFarm(){
 const farmDiv = document.getElementById("farm");
 farmDiv.innerHTML = "";

 farm.forEach((plot,i)=>{
   const div = document.createElement("div");
   div.className = "plot";

   if(!plot){
     div.innerText="빈 땅";
     div.onclick=()=>plant(i);
   }
   else if(plot.stage==="growing"){
     div.innerText="🌱 성장중...";
   }
   else{
     div.innerText="🌾 클릭 수확!";
     div.classList.add("ready");
     div.onclick=()=>harvest(i);
   }

   farmDiv.appendChild(div);
 });
}

function plantAll(){
 for(let i=0;i<farm.length;i++){
   if(!farm[i]) plant(i);
 }
}

function plant(i){
 if(farm[i]) return;

 const type = document.getElementById("crop").value;

 farm[i] = { type, stage:"growing" };

 const growTime = crops[type].time * weatherRate;

 setTimeout(()=>{
   if(farm[i]){
     farm[i].stage="ready";
     renderFarm();
   }
 }, growTime);

 renderFarm();
}

function harvest(i){
 const type = farm[i].type;
 crops[type].count++;

 farm[i]=null;
 renderFarm();
}

function sell(){
 let total=0;

 for(let k in crops){
   total += crops[k].count * crops[k].price;
   crops[k].count=0;
 }

 gold += total;

 update();
 updateTitle();
}

function update(){
 document.getElementById("gold").innerText=gold;
 updateTitle();
}

function randomEvent(){
 const r = Math.random();

 if(r < 0.2){
   // 벌레 이벤트
   const idx = Math.floor(Math.random()*farm.length);
   if(farm[idx]) farm[idx]=null;
 }
 else if(r < 0.3){
   // 풍년
   for(let k in crops){
     crops[k].count += 1;
   }
 }

 renderFarm();
 update();
}

setInterval(randomEvent, 20000);

renderFarm();
update();
changeWeather();
</script>

</body>
</html>
